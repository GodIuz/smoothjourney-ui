<div class="forgot-wrapper">
  <div class="glass-card">
    <div class="card-header">
      <div class="icon-circle">
        <i class="fa-solid fa-lock"></i>
      </div>
      <h2>Ξεχάσατε τον κωδικό;</h2>
      <p>
        Μην ανησυχείτε! Συμπληρώστε το email σας και θα σας στείλουμε οδηγίες
        επαναφοράς.
      </p>
    </div>

    <form #forgotForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label><i class="fa-solid fa-envelope"></i> Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="name@example.com"
          required
          email
        />
      </div>

      <div *ngIf="error" class="message error-msg">
        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
      </div>

      <div *ngIf="message" class="message success-msg">
        <i class="fa-solid fa-paper-plane"></i> {{ message }}
      </div>

      <button
        type="submit"
        [disabled]="forgotForm.invalid || isLoading"
        class="btn-submit"
      >
        {{ isLoading ? "Αποστολή..." : "Αποστολή Link" }}
      </button>

      <div class="back-link">
        <a routerLink="/login"
          ><i class="fa-solid fa-arrow-left"></i> Επιστροφή στη Σύνδεση</a
        >
      </div>
    </form>
  </div>
</div>
