<div class="dashboard-container">
  <div class="d-header">
    <h1>Dashboard</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card" *ngFor="let item of stats" [ngClass]="item.border">
      <div class="card-body">
        <div class="text-column">
          <div class="stat-title" [style.color]="item.color">
            {{ item.title }}
          </div>
          <div class="stat-value">{{ item.value }}</div>
        </div>
        <div class="icon-column">
          <i [class]="item.icon"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="content-row">
    <div class="card list-card">
      <div class="card-header">
        <h6>Νέες Επιχειρήσεις</h6>
      </div>
      <div class="card-body p-0">
        <div class="list-container">
          <div class="list-item" *ngFor="let item of latestBusinesses">
            <div class="item-icon-wrapper">
              <div
                class="img-circle"
                *ngIf="item.imageUrl && item.imageUrl !== 'null'"
                [style.background-image]="'url(' + item.imageUrl + ')'"
              ></div>
              <div
                class="icon-circle"
                *ngIf="!item.imageUrl || item.imageUrl === 'null'"
                [ngClass]="getCategoryClass(item.category)"
              >
                <i [class]="getCategoryIcon(item.category)"></i>
              </div>
            </div>

            <div class="item-details">
              <span class="item-name">{{ item.name }}</span>
              <span class="item-sub"
                >{{ item.category }} • {{ item.city }}</span
              >
            </div>

            <div class="item-status">
              <span class="rating-badge">
                <i class="fa-solid fa-star"></i>
                {{ item.rating | number: "1.1-1" }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
