<div class="reset-wrapper">
  <div class="glass-card">
    <div class="card-header">
      <h2>Νέος Κωδικός</h2>
      <p>Εισάγετε τον νέο σας κωδικό παρακάτω.</p>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!message">
      <div class="input-group">
        <label><i class="fa-solid fa-lock"></i> Νέος Κωδικός</label>
        <input
          type="password"
          [(ngModel)]="newPassword"
          name="newPassword"
          required
          placeholder="••••••••"
        />
      </div>

      <div class="input-group">
        <label><i class="fa-solid fa-check-double"></i> Επιβεβαίωση</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          placeholder="••••••••"
        />
      </div>

      <div *ngIf="error" class="message error-msg">
        <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
      </div>

      <button type="submit" [disabled]="isLoading || !token" class="btn-submit">
        {{ isLoading ? "Αποθήκευση..." : "Αλλαγή Κωδικού" }}
      </button>
    </form>

    <div *ngIf="message" class="message success-msg">
      <i class="fa-solid fa-check-circle"></i> {{ message }}
    </div>
  </div>
</div>
