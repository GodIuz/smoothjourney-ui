<div class="trip-maker-wrapper">
  <aside class="trip-sidebar">
    <div class="p-4">
      <h4 class="text-white mb-4">
        <i class="fa-solid fa-suitcase me-2"></i>Trip Planner
      </h4>

      <div *ngIf="!tripId">
        <div class="mb-3">
          <label class="text-muted small">Πόλη Προορισμού</label>
          <select
            [(ngModel)]="selectedCity"
            (change)="onCityChange()"
            class="form-select bg-dark text-white border-secondary"
          >
            <option value="">Επιλέξτε Πόλη...</option>
            <option *ngFor="let city of cities" [value]="city">
              {{ city }}
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="text-muted small">Τίτλος Ταξιδιού</label>
          <input
            type="text"
            [(ngModel)]="tripName"
            class="form-control bg-dark text-white border-secondary"
          />
        </div>

        <div class="row mb-3">
          <div class="col">
            <input
              type="date"
              [(ngModel)]="startDate"
              class="form-control bg-dark text-white"
            />
          </div>
          <div class="col">
            <input
              type="date"
              [(ngModel)]="endDate"
              class="form-control bg-dark text-white"
            />
          </div>
        </div>

        <button
          class="btn btn-success w-100"
          (click)="startNewTrip()"
          [disabled]="!selectedCity"
        >
          Δημιουργία & Έναρξη
        </button>
      </div>

      <div *ngIf="tripId" class="mt-4">
        <div
          class="budget-card p-3 rounded bg-dark border-start border-success border-4"
        >
          <div class="d-flex justify-content-between text-white">
            <span>Κόστος:</span>
            <strong>{{ currentCost }}€ / {{ totalBudget }}€</strong>
          </div>
          <div class="progress mt-2" style="height: 8px">
            <div
              class="progress-bar bg-success"
              [style.width.%]="(currentCost / totalBudget) * 100"
            ></div>
          </div>
        </div>

        <div class="itinerary mt-4">
          <h6 class="text-muted small">
            Η ΔΙΑΔΡΟΜΗ ΣΟΥ ΣΤΗΝ {{ selectedCity | uppercase }}
          </h6>
          <div class="itinerary-item" *ngFor="let item of selectedItems">
            {{ item.name }}
          </div>
        </div>
      </div>
    </div>
  </aside>

  <main class="content-area p-4">
    <div class="row g-4" *ngIf="selectedCity; else noCity">
      <div class="col-md-4" *ngFor="let b of filteredBusinesses">
        <div class="card business-card bg-dark text-white border-secondary">
          <div
            class="card-body d-flex justify-content-between align-items-center"
          >
            <div>
              <h6 class="mb-0">{{ b.name }}</h6>
              <small class="text-success">{{ b.priceRange }}</small>
            </div>
            <button class="btn btn-circle btn-success" (click)="addItem(b)">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <ng-template #noCity>
      <div class="text-center text-muted mt-5">
        <h5>
          Επιλέξτε πρώτα μια πόλη από το μενού για να δείτε τις επιχειρήσεις.
        </h5>
      </div>
    </ng-template>
  </main>
</div>
